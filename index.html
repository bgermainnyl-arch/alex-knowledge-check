<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body { margin: 0; background: #1a1a2e; 
           display: flex; flex-direction: column;
           align-items: center; justify-content: center; 
           min-height: 100vh; font-family: Arial, sans-serif; }
    h1 { color: #ffffff; margin-bottom: 2rem; font-size: 1.5rem; }
  </style>
</head>
<body>
  <h1>Whole Life Insurance — Knowledge Check</h1>
  <elevenlabs-convai id="el-widget" agent-id="agent_6601kpbt8628er29rfw2x8zesrby">
  </elevenlabs-convai>

  <script>
    // Read URL parameters immediately before widget loads
    var params = new URLSearchParams(window.location.search);
    var userID = params.get('user_id') || 'Unknown';
    var courseID = params.get('course_id') || 'NYL-BG-TEST';

    // Set dynamic variables directly on the element before the widget script runs
    var widget = document.getElementById('el-widget');
    widget.setAttribute('dynamic-variables', JSON.stringify({
      user_id: userID,
      course_id: courseID
    }));
  </script>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" 
          async type="text/javascript"></script>
</body>
