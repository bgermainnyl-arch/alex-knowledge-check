           display: flex; flex-direction: column;
           align-items: center; justify-content: center; 
           min-height: 100vh; font-family: Arial, sans-serif; }

  </style>

<body>
  <h1>Whole Life Insurance — Knowledge Check</h1>
  <elevenlabs-convai agent-id="agent_6601kpbt8628er29rfw2x8zesrby">
  </elevenlabs-convai>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" 
          async type="text/javascript"></script>
  <script>
    window.addEventListener('load', function() {
      var params = new URLSearchParams(window.location.search);
      var userID = params.get('user_id') || 'Unknown';
      var courseID = params.get('course_id') || 'Unknown';

      var widget = document.querySelector('elevenlabs-convai');
      if (widget) {
        widget.setAttribute('dynamic-variables', JSON.stringify({
          user_id: userID,
          course_id: courseID
        }));
      }
    });
  </script>
</body>
